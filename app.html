<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapa Lanches</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #f2b300;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .pedido {
      background: #25d366;
      color: #000;
    }

    .pedido:hover {
      background: #1ebe5d;
    }

    .admin {
      background: #3b82f6;
      color: #fff;
    }

    .admin:hover {
      background: #2563eb;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🍔 Chapa Lanches</h1>

    <button class="btn pedido" onclick="abrirPedido()">
      Fazer Pedido
    </button>

    <button class="btn admin" onclick="abrirAdmin()">
      Painel Admin
    </button>

    <div class="footer">
      Sistema interno
    </div>
  </div>

  <script>
    function abrirPedido() {
      window.location.href = "https://chapa-lanches.vercel.app/";
    }

    function abrirAdmin() {
      window.location.href = "https://chapa-lanches.vercel.app/admin.html";
    }
  </script>

</body>
</html>
