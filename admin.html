<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Chapa Lanches</title>

  <link rel="icon" href="img/logofull.svg">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <header>
    <div class="header-container">
      <div class="logo">
        <img src="img/logofull-126.svg" alt="Logo Chapa Lanches">
        <span>Painel Admin</span>
      </div>

      <div class="top-actions">
        <button class="btn btn-yellow" id="btnAtualizar">Atualizar</button>
        <button class="btn btn-blue" id="btnExportar">Exportar JSON</button>
        <button class="btn btn-red" id="btnLimparTudo">Limpar Tudo</button>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="titulo">Pedidos</h1>

    <section class="stats-grid">
      <div class="stat-card">
        <p>Total</p>
        <strong id="totalPedidos">0</strong>
      </div>

      <div class="stat-card">
        <p>Pendentes</p>
        <strong id="totalPendentes">0</strong>
      </div>

      <div class="stat-card">
        <p>Em preparo</p>
        <strong id="totalPreparo">0</strong>
      </div>

      <div class="stat-card">
        <p>Em entrega</p>
        <strong id="totalEntrega">0</strong>
      </div>

      <div class="stat-card">
        <p>Finalizados</p>
        <strong id="totalFinalizados">0</strong>
      </div>
    </section>

    <section class="filtros">
      <input type="text" id="buscaPedido" placeholder="Buscar por cliente, telefone, bairro, entrega...">
      
      <select id="filtroStatus">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="em preparo">Em preparo</option>
        <option value="em entrega">Em entrega</option>
        <option value="finalizado">Finalizado</option>
      </select>
    </section>

    <section id="listaPedidos" class="lista-pedidos"></section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
