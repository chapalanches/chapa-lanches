<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin - Chapa Lanches</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #111111;
      --bg-soft: #1a1a1a;
      --card: #1c1c1c;
      --card-2: #232323;
      --line: #2d2d2d;
      --text: #ffffff;
      --muted: #cfcfcf;
      --yellow: #f2b300;
      --yellow-dark: #d89f00;
      --green: #25d366;
      --green-dark: #1ebe5d;
      --blue: #3b82f6;
      --blue-dark: #2563eb;
      --danger: #ff5a5a;
      --danger-dark: #e04848;
      --gray: #808080;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #101010 0%, #151515 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--yellow), #ffcf4d);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: var(--shadow);
    }

    .brand h1 {
      font-size: 22px;
      line-height: 1.1;
    }

    .brand p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-yellow {
      background: var(--yellow);
      color: #111;
    }

    .btn-yellow:hover {
      background: var(--yellow-dark);
    }

    .btn-green {
      background: var(--green);
      color: white;
    }

    .btn-green:hover {
      background: var(--green-dark);
    }

    .btn-blue {
      background: var(--blue);
      color: white;
    }

    .btn-blue:hover {
      background: var(--blue-dark);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-dark);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-outline:hover {
      background: #222;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat-card {
      padding: 18px;
    }

    .stat-title {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .stat-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 18px;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .select,
    .input {
      background: #111;
      color: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 180px;
      outline: none;
    }

    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37, 211, 102, 0.12);
      color: #87f0b2;
      border: 1px solid rgba(37, 211, 102, 0.25);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }

    .dot-live {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    .orders-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .order-card {
      padding: 18px;
      border-left: 5px solid var(--yellow);
      transition: 0.2s ease;
    }

    .order-card:hover {
      transform: translateY(-2px);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .order-id {
      font-size: 20px;
      font-weight: bold;
    }

    .order-meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .status-badge {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-novo {
      background: rgba(242, 179, 0, 0.15);
      color: #ffd566;
      border-color: rgba(242, 179, 0, 0.25);
    }

    .status-preparando {
      background: rgba(59, 130, 246, 0.15);
      color: #86b5ff;
      border-color: rgba(59, 130, 246, 0.25);
    }

    .status-saiu {
      background: rgba(37, 211, 102, 0.15);
      color: #87f0b2;
      border-color: rgba(37, 211, 102, 0.25);
    }

    .status-concluido {
      background: rgba(130, 130, 130, 0.18);
      color: #d9d9d9;
      border-color: rgba(130, 130, 130, 0.25);
    }

    .status-cancelado {
      background: rgba(255, 90, 90, 0.15);
      color: #ff9b9b;
      border-color: rgba(255, 90, 90, 0.25);
    }

    .order-body {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }

    .box {
      background: #151515;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .box h3 {
      font-size: 14px;
      color: var(--yellow);
      margin-bottom: 10px;
    }

    .box p,
    .box li {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .box strong {
      color: var(--text);
    }

    .items-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      border-bottom: 1px dashed #2c2c2c;
      padding-bottom: 8px;
    }

    .item-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .item-name {
      color: var(--text);
      font-weight: bold;
    }

    .item-obs {
      font-size: 12px;
      color: #aaaaaa;
      margin-top: 3px;
    }

    .item-price {
      color: var(--yellow);
      font-weight: bold;
      white-space: nowrap;
    }

    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .order-total {
      font-size: 18px;
      font-weight: bold;
    }

    .order-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .mini-btn:hover {
      transform: translateY(-1px);
    }

    .mini-yellow { background: var(--yellow); color: #111; }
    .mini-blue { background: var(--blue); color: white; }
    .mini-green { background: var(--green); color: white; }
    .mini-gray { background: #4c4c4c; color: white; }
    .mini-red { background: var(--danger); color: white; }

    .empty {
      padding: 50px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
    }

    .highlight-new {
      animation: newOrderFlash 1.3s ease;
    }

    @keyframes newOrderFlash {
      0% { box-shadow: 0 0 0 rgba(242, 179, 0, 0); }
      30% { box-shadow: 0 0 0 4px rgba(242, 179, 0, 0.35); }
      100% { box-shadow: 0 0 0 rgba(242, 179, 0, 0); }
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .grid-top {
        grid-template-columns: repeat(2, 1fr);
      }

      .order-body {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .grid-top {
        grid-template-columns: 1fr;
      }

      .topbar-inner {
        align-items: flex-start;
      }

      .toolbar {
        padding: 14px;
      }

      .toolbar-left,
      .toolbar-right {
        width: 100%;
      }

      .select,
      .input {
        width: 100%;
      }

      .order-id {
        font-size: 18px;
      }

      .order-footer {
        align-items: stretch;
      }

      .order-actions {
        width: 100%;
      }

      .order-actions .mini-btn {
        flex: 1 1 calc(50% - 8px);
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-logo">🍔</div>
        <div>
          <h1>Chapa Lanches - Admin</h1>
          <p>Painel de pedidos em tempo real</p>
        </div>
      </div>

      <div class="top-actions">
        <div class="badge-live">
          <span class="dot-live"></span>
          Atualização automática
        </div>
        <button class="btn btn-outline" onclick="toggleSound()" id="soundBtn">🔔 Som: Ligado</button>
        <button class="btn btn-yellow" onclick="criarPedidoTeste()">+ Pedido teste</button>
        <button class="btn btn-danger" onclick="limparPedidos()">Limpar tudo</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="grid-top">
      <div class="card stat-card">
        <div class="stat-title">Pedidos hoje</div>
        <div class="stat-value" id="statHoje">0</div>
        <div class="stat-sub">Total registrados</div>
      </div>

      <div class="card stat-card">
        <div class="stat-title">Novos / Pendentes</div>
        <div class="stat-value" id="statNovos">0</div>
        <div class="stat-sub">Aguardando atendimento</div>
      </div>

      <div class="card stat-card">
        <div class="stat-title">Em preparo / Entrega</div>
        <div class="stat-value" id="statAndamento">0</div>
        <div class="stat-sub">Pedidos em andamento</div>
      </div>

      <div class="card stat-card">
        <div class="stat-title">Faturamento hoje</div>
        <div class="stat-value" id="statFaturamento">R$ 0,00</div>
        <div class="stat-sub">Somente concluídos</div>
      </div>
    </section>

    <section class="card toolbar">
      <div class="toolbar-left">
        <select class="select" id="filtroStatus" onchange="renderPedidos()">
          <option value="todos">Todos os status</option>
          <option value="novo">Novo</option>
          <option value="preparando">Preparando</option>
          <option value="saiu">Saiu para entrega</option>
          <option value="concluido">Concluído</option>
          <option value="cancelado">Cancelado</option>
        </select>

        <select class="select" id="filtroTipo" onchange="renderPedidos()">
          <option value="todos">Retirada + Delivery</option>
          <option value="delivery">Somente Delivery</option>
          <option value="retirada">Somente Retirada</option>
        </select>
      </div>

      <div class="toolbar-right">
        <input
          type="text"
          class="input"
          id="buscaPedido"
          placeholder="Buscar por cliente, telefone ou pedido..."
          oninput="renderPedidos()"
        />
      </div>
    </section>

    <section id="ordersContainer" class="orders-grid"></section>
  </main>

  <script>
    const STORAGE_KEY = "chapa_pedidos";
    let soundEnabled = true;
    let ultimoTotalPedidos = 0;

    function getPedidos() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        const pedidos = data ? JSON.parse(data) : [];
        return Array.isArray(pedidos) ? pedidos : [];
      } catch (e) {
        return [];
      }
    }

    function savePedidos(pedidos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pedidos));
    }

    function formatMoney(value) {
      const numero = Number(value || 0);
      return numero.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatDateTime(data) {
      if (!data) return "-";
      const dt = new Date(data);
      if (isNaN(dt.getTime())) return data;
      return dt.toLocaleString("pt-BR");
    }

    function getStatusLabel(status) {
      const mapa = {
        novo: "Novo",
        preparando: "Preparando",
        saiu: "Saiu para entrega",
        concluido: "Concluído",
        cancelado: "Cancelado"
      };
      return mapa[status] || "Novo";
    }

    function getTipoLabel(tipo) {
      if (tipo === "delivery") return "Delivery";
      if (tipo === "retirada") return "Retirada";
      return "Não informado";
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function atualizarStatus(id, novoStatus) {
      const pedidos = getPedidos();
      const index = pedidos.findIndex(p => String(p.id) === String(id));
      if (index === -1) return;

      pedidos[index].status = novoStatus;
      pedidos[index].atualizadoEm = new Date().toISOString();

      savePedidos(pedidos);
      renderPedidos();
    }

    function excluirPedido(id) {
      const confirmar = confirm("Deseja realmente excluir este pedido?");
      if (!confirmar) return;

      const pedidos = getPedidos().filter(p => String(p.id) !== String(id));
      savePedidos(pedidos);
      renderPedidos();
    }

    function limparPedidos() {
      const confirmar = confirm("Deseja apagar TODOS os pedidos?");
      if (!confirmar) return;
      localStorage.removeItem(STORAGE_KEY);
      renderPedidos();
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById("soundBtn").textContent = soundEnabled ? "🔔 Som: Ligado" : "🔕 Som: Desligado";
    }

    function playNewOrderSound() {
      if (!soundEnabled) return;

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.35);
      } catch (e) {}
    }

    function atualizarResumo(pedidos) {
      const hoje = new Date().toLocaleDateString("pt-BR");

      const pedidosHoje = pedidos.filter(p => {
        const data = p.data || p.criadoEm;
        if (!data) return false;
        const d = new Date(data);
        return d.toLocaleDateString("pt-BR") === hoje;
      });

      const novos = pedidosHoje.filter(p => p.status === "novo").length;
      const andamento = pedidosHoje.filter(p => p.status === "preparando" || p.status === "saiu").length;
      const faturamento = pedidosHoje
        .filter(p => p.status === "concluido")
        .reduce((acc, p) => acc + Number(p.total || 0), 0);

      document.getElementById("statHoje").textContent = pedidosHoje.length;
      document.getElementById("statNovos").textContent = novos;
      document.getElementById("statAndamento").textContent = andamento;
      document.getElementById("statFaturamento").textContent = formatMoney(faturamento);
    }

    function renderPedidos() {
      const container = document.getElementById("ordersContainer");
      const filtroStatus = document.getElementById("filtroStatus").value;
      const filtroTipo = document.getElementById("filtroTipo").value;
      const busca = document.getElementById("buscaPedido").value.trim().toLowerCase();

      let pedidos = getPedidos();

      pedidos.sort((a, b) => {
        const da = new Date(a.data || a.criadoEm || 0).getTime();
        const db = new Date(b.data || b.criadoEm || 0).getTime();
        return db - da;
      });

      atualizarResumo(pedidos);

      const novosTotal = pedidos.length;
      if (novosTotal > ultimoTotalPedidos) {
        playNewOrderSound();
      }
      ultimoTotalPedidos = novosTotal;

      pedidos = pedidos.filter(p => {
        const statusOk = filtroStatus === "todos" || (p.status || "novo") === filtroStatus;
        const tipoOk = filtroTipo === "todos" || (p.tipoEntrega || "").toLowerCase() === filtroTipo;

        const textoBusca = [
          p.id,
          p.nome,
          p.telefone,
          p.endereco,
          p.pagamento
        ].join(" ").toLowerCase();

        const buscaOk = !busca || textoBusca.includes(busca);

        return statusOk && tipoOk && buscaOk;
      });

      if (!pedidos.length) {
        container.innerHTML = `
          <div class="card empty">
            Nenhum pedido encontrado no momento.
          </div>
        `;
        return;
      }

      container.innerHTML = pedidos.map((pedido, index) => {
        const status = pedido.status || "novo";
        const itens = Array.isArray(pedido.itens) ? pedido.itens : [];

        const taxaEntrega = Number(pedido.taxaEntrega || 0);
        const subtotal = Number(pedido.subtotal || 0);
        const total = Number(pedido.total || 0);

        const itensHtml = itens.length
          ? itens.map(item => `
              <li class="item-row">
                <div>
                  <div class="item-name">${escapeHtml(item.nome || "Item")}</div>
                  <div class="item-obs">
                    Qtd: ${escapeHtml(item.qtd || 1)}
                    ${item.observacao ? ` • Obs: ${escapeHtml(item.observacao)}` : ""}
                  </div>
                </div>
                <div class="item-price">${formatMoney(item.preco || 0)}</div>
              </li>
            `).join("")
          : `<li class="muted">Itens não informados.</li>`;

        return `
          <article class="card order-card ${index === 0 ? "highlight-new" : ""}">
            <div class="order-header">
              <div>
                <div class="order-id">Pedido #${escapeHtml(pedido.id || "--")}</div>
                <div class="order-meta">
                  ${formatDateTime(pedido.data || pedido.criadoEm)} • ${getTipoLabel(pedido.tipoEntrega)}
                </div>
              </div>

              <div class="status-badge status-${status}">
                ${getStatusLabel(status)}
              </div>
            </div>

            <div class="order-body">
              <div class="box">
                <h3>Itens do pedido</h3>
                <ul class="items-list">
                  ${itensHtml}
                </ul>
              </div>

              <div class="box">
                <h3>Cliente</h3>
                <p><strong>Nome:</strong> ${escapeHtml(pedido.nome || "-")}</p>
                <p><strong>Telefone:</strong> ${escapeHtml(pedido.telefone || "-")}</p>
                <p><strong>Pagamento:</strong> ${escapeHtml(pedido.pagamento || "-")}</p>
                <p><strong>Troco para:</strong> ${pedido.troco ? escapeHtml(pedido.troco) : "-"}</p>
              </div>

              <div class="box">
                <h3>Entrega</h3>
                <p><strong>Tipo:</strong> ${getTipoLabel(pedido.tipoEntrega)}</p>
                <p><strong>Endereço:</strong> ${escapeHtml(pedido.endereco || "-")}</p>
                <p><strong>Bairro:</strong> ${escapeHtml(pedido.bairro || "-")}</p>
                <p><strong>Complemento:</strong> ${escapeHtml(pedido.complemento || "-")}</p>
                <p><strong>Observações:</strong> ${escapeHtml(pedido.observacoes || "-")}</p>
              </div>
            </div>

            <div class="order-footer">
              <div class="order-total">
                Subtotal: ${formatMoney(subtotal)} ${taxaEntrega > 0 ? `• Entrega: ${formatMoney(taxaEntrega)} • ` : "• "}
                Total: ${formatMoney(total)}
              </div>

              <div class="order-actions">
                <button class="mini-btn mini-yellow" onclick="atualizarStatus('${escapeHtml(pedido.id)}', 'novo')">Novo</button>
                <button class="mini-btn mini-blue" onclick="atualizarStatus('${escapeHtml(pedido.id)}', 'preparando')">Preparando</button>
                <button class="mini-btn mini-green" onclick="atualizarStatus('${escapeHtml(pedido.id)}', 'saiu')">Saiu</button>
                <button class="mini-btn mini-gray" onclick="atualizarStatus('${escapeHtml(pedido.id)}', 'concluido')">Concluído</button>
                <button class="mini-btn mini-red" onclick="atualizarStatus('${escapeHtml(pedido.id)}', 'cancelado')">Cancelar</button>
                <button class="mini-btn btn-outline" onclick="excluirPedido('${escapeHtml(pedido.id)}')">Excluir</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function criarPedidoTeste() {
      const pedidos = getPedidos();

      const id = Date.now();
      const pedido = {
        id,
        data: new Date().toISOString(),
        criadoEm: new Date().toISOString(),
        status: "novo",
        nome: "Cliente Teste",
        telefone: "(15) 99999-9999",
        tipoEntrega: Math.random() > 0.5 ? "delivery" : "retirada",
        endereco: "Rua Exemplo, 123",
        bairro: "Centro",
        complemento: "Casa",
        observacoes: "Sem cebola, por favor",
        pagamento: "Pix",
        troco: "",
        subtotal: 32.00,
        taxaEntrega: 4.00,
        total: 36.00,
        itens: [
          { nome: "X-Burguer", qtd: 1, preco: 18.00, observacao: "Sem tomate" },
          { nome: "Batata Frita", qtd: 1, preco: 14.00, observacao: "" }
        ]
      };

      if (pedido.tipoEntrega === "retirada") {
        pedido.taxaEntrega = 0;
        pedido.total = pedido.subtotal;
        pedido.endereco = "";
        pedido.bairro = "";
        pedido.complemento = "";
      }

      pedidos.unshift(pedido);
      savePedidos(pedidos);
      renderPedidos();
    }

    window.addEventListener("storage", function(event) {
      if (event.key === STORAGE_KEY) {
        renderPedidos();
      }
    });

    setInterval(renderPedidos, 3000);

    renderPedidos();
  </script>
