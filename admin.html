<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Pedidos - Chapa Lanches</title>

<link rel="icon" href="img/logofull.svg">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="header-container">

<div class="logo">
<img src="img/logofull-126.svg">
<span>Painel - Chapa Lanches</span>
</div>

</div>

</header>

<div class="container">

<h1 class="titulo">Painel de Pedidos</h1>

<div class="grid-cardapio" style="margin-bottom:25px;">

<div class="card">
<h3>Total de pedidos</h3>
<div class="preco" id="total-pedidos">0</div>
</div>

<div class="card">
<h3>Pedidos hoje</h3>
<div class="preco" id="total-hoje">0</div>
</div>

<div class="card">
<h3>Faturamento hoje</h3>
<div class="preco" id="faturamento-hoje">R$ 0,00</div>
</div>

</div>

<button
id="btn-limpar-pedidos"
class="btn-whatsapp"
style="max-width:300px;margin-bottom:25px;"
>
Limpar todos os pedidos
</button>

<h2 style="margin-bottom:15px;">Pedidos recebidos</h2>

<div id="pedidos-container" class="admin-pedidos">

<div class="pedido">
<h4>Nenhum pedido ainda</h4>
<p>Quando os pedidos chegarem eles aparecerão aqui.</p>
</div>

</div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
